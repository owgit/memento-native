<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="Memento Native product overview">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="46%" stop-color="#0e1b2f"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="36" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#hero-bg)"/>
  <circle cx="1145" cy="155" r="190" fill="#22d3ee" opacity="0.10" filter="url(#soft-glow)"/>
  <circle cx="170" cy="655" r="220" fill="#f59e0b" opacity="0.08" filter="url(#soft-glow)"/>
  <path d="M0 620 C190 560 325 610 520 555 C775 484 990 455 1400 520 L1400 760 L0 760 Z" fill="#020617" opacity="0.42"/>

  <g transform="translate(82 82)">
    <rect x="0" y="0" width="1236" height="596" rx="34" fill="#020617" opacity="0.72" stroke="#1f2937"/>

    <g transform="translate(42 38)">
      <rect x="0" y="0" width="282" height="42" rx="21" fill="#0f172a" stroke="#243044"/>
      <circle cx="24" cy="21" r="8" fill="#ef4444"/>
      <circle cx="48" cy="21" r="8" fill="#f59e0b"/>
      <circle cx="72" cy="21" r="8" fill="#22c55e"/>
      <text x="104" y="27" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#dbeafe" font-weight="700">Memento Native</text>
    </g>

    <g transform="translate(64 118)">
      <text x="0" y="0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="64" fill="#f8fafc" font-weight="800">Find anything</text>
      <text x="0" y="72" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="64" fill="#f8fafc" font-weight="800">you saw on your Mac.</text>
      <text x="0" y="126" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="24" fill="#94a3b8">Local-first screen memory with OCR search, app filters,</text>
      <text x="0" y="160" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="24" fill="#94a3b8">semantic recall, and a private timeline that stays on-device.</text>

      <g transform="translate(0 212)">
        <rect x="0" y="0" width="178" height="52" rx="26" fill="url(#accent)"/>
        <text x="28" y="33" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" fill="#07111f" font-weight="800">Download DMG</text>
        <rect x="196" y="0" width="174" height="52" rx="26" fill="#0f172a" stroke="#334155"/>
        <text x="225" y="33" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">View on GitHub</text>
      </g>

      <g transform="translate(0 304)">
        <rect x="0" y="0" width="166" height="44" rx="22" fill="#0f172a" stroke="#164e63"/>
        <text x="22" y="28" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#67e8f9" font-weight="700">100% local</text>
        <rect x="182" y="0" width="150" height="44" rx="22" fill="#0f172a" stroke="#164e63"/>
        <text x="204" y="28" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#67e8f9" font-weight="700">OCR search</text>
        <rect x="348" y="0" width="168" height="44" rx="22" fill="#0f172a" stroke="#164e63"/>
        <text x="370" y="28" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#67e8f9" font-weight="700">macOS 14+</text>
      </g>
    </g>

    <g transform="translate(712 108)" filter="url(#shadow)">
      <rect x="0" y="0" width="456" height="362" rx="28" fill="url(#panel)" stroke="#334155"/>
      <rect x="24" y="24" width="408" height="50" rx="18" fill="#020617" stroke="#1f2937"/>
      <circle cx="51" cy="49" r="9" fill="#22d3ee"/>
      <text x="76" y="55" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="17" fill="#f8fafc" font-weight="700">Search timeline</text>
      <text x="308" y="55" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#64748b">Cmd F</text>

      <g transform="translate(24 96)">
        <rect x="0" y="0" width="84" height="34" rx="17" fill="#22d3ee"/>
        <text x="22" y="22" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#06202a" font-weight="800">All</text>
        <rect x="96" y="0" width="92" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
        <text x="116" y="22" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#cbd5e1" font-weight="700">Safari</text>
        <rect x="200" y="0" width="96" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
        <text x="220" y="22" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#cbd5e1" font-weight="700">Cursor</text>
        <rect x="308" y="0" width="92" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
        <text x="330" y="22" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#cbd5e1" font-weight="700">Xcode</text>
      </g>

      <g transform="translate(24 162)">
        <rect x="0" y="0" width="408" height="72" rx="18" fill="#0f172a" stroke="#1e293b"/>
        <rect x="16" y="17" width="62" height="38" rx="10" fill="#1e293b"/>
        <path d="M28 43 L43 28 L54 39 L62 31 L70 43 Z" fill="#22d3ee" opacity="0.9"/>
        <text x="96" y="31" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#f8fafc" font-weight="700">API migration checklist</text>
        <text x="96" y="53" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#94a3b8">Safari · 14:32 · OCR match</text>

        <rect x="0" y="90" width="408" height="72" rx="18" fill="#0b1220" stroke="#1e293b"/>
        <rect x="16" y="107" width="62" height="38" rx="10" fill="#1e293b"/>
        <path d="M27 137 C38 113 58 112 69 137" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
        <text x="96" y="121" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#f8fafc" font-weight="700">Build error before deploy</text>
        <text x="96" y="143" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="13" fill="#94a3b8">Cursor · 15:08 · Semantic match</text>
      </g>

      <g transform="translate(24 326)">
        <rect x="0" y="0" width="408" height="8" rx="4" fill="#1e293b"/>
        <rect x="36" y="0" width="54" height="8" rx="4" fill="#22d3ee"/>
        <rect x="142" y="0" width="36" height="8" rx="4" fill="#f59e0b"/>
        <rect x="246" y="0" width="82" height="8" rx="4" fill="#22d3ee"/>
        <circle cx="268" cy="4" r="15" fill="#f8fafc" stroke="#22d3ee" stroke-width="5"/>
      </g>
    </g>
  </g>
</svg>
