<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Update flow">
  <rect width="1200" height="640" fill="#0b1020" />
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="42" fill="#f8fafc" font-weight="700">In-app Update Flow</text>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="22" fill="#94a3b8">Check -> Download DMG -> Install -> Relaunch</text>
  <rect x="60" y="200" width="240" height="140" rx="16" fill="#1d4ed8" />
  <text x="90" y="278" font-family="Arial, sans-serif" font-size="24" fill="#fff">Check release</text>
  <rect x="360" y="200" width="240" height="140" rx="16" fill="#0f766e" />
  <text x="384" y="278" font-family="Arial, sans-serif" font-size="24" fill="#fff">Download DMG</text>
  <rect x="660" y="200" width="240" height="140" rx="16" fill="#7c3aed" />
  <text x="712" y="278" font-family="Arial, sans-serif" font-size="24" fill="#fff">Install apps</text>
  <rect x="960" y="200" width="180" height="140" rx="16" fill="#b45309" />
  <text x="992" y="278" font-family="Arial, sans-serif" font-size="24" fill="#fff">Relaunch</text>
  <path d="M305 270 L350 270" stroke="#e2e8f0" stroke-width="5" marker-end="url(#arr)"/>
  <path d="M605 270 L650 270" stroke="#e2e8f0" stroke-width="5" marker-end="url(#arr)"/>
  <path d="M905 270 L950 270" stroke="#e2e8f0" stroke-width="5" marker-end="url(#arr)"/>
  <text x="60" y="430" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">Requirement: release must include asset named Memento-Native-&lt;version&gt;.dmg</text>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e2e8f0" />
    </marker>
  </defs>
</svg>
