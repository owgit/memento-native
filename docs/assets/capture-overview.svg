<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-label="Memento Native timeline with app filters">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06121f"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#060a12"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <path d="M98 630 C286 540 409 672 604 572 C793 476 994 464 1308 544" fill="none" stroke="#164e63" stroke-width="2" opacity="0.55"/>
  <path d="M122 160 C336 94 514 118 710 88 C930 54 1118 76 1282 142" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.2"/>

  <g transform="translate(90 74)">
    <text x="0" y="0" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="46" fill="#f8fafc" font-weight="800">Timeline built for real work</text>
    <text x="0" y="42" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="21" fill="#94a3b8">Filter by app, jump between moments, and search what you already saw.</text>
  </g>

  <g transform="translate(92 154)" filter="url(#shadow)">
    <rect x="0" y="0" width="1216" height="514" rx="34" fill="url(#screen)" stroke="#334155"/>
    <g transform="translate(30 26)">
      <circle cx="13" cy="13" r="7" fill="#ef4444"/>
      <circle cx="37" cy="13" r="7" fill="#f59e0b"/>
      <circle cx="61" cy="13" r="7" fill="#22c55e"/>
      <text x="96" y="19" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#64748b">Memento Timeline</text>
    </g>

    <g transform="translate(42 82)">
      <rect x="0" y="0" width="510" height="58" rx="20" fill="#020617" stroke="#1e293b"/>
      <text x="26" y="37" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="18" fill="#cbd5e1">Search OCR, title, URL, or meaning...</text>
      <rect x="530" y="0" width="116" height="58" rx="20" fill="url(#cyan)"/>
      <text x="558" y="37" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="16" fill="#06202a" font-weight="800">Search</text>
    </g>

    <g transform="translate(42 166)">
      <rect x="0" y="0" width="104" height="40" rx="20" fill="#22d3ee"/>
      <text x="32" y="26" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#04202a" font-weight="900">All 84</text>
      <rect x="120" y="0" width="132" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="145" y="26" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="700">Safari 27</text>
      <rect x="268" y="0" width="132" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="293" y="26" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="700">Cursor 19</text>
      <rect x="416" y="0" width="128" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="443" y="26" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="700">Xcode 11</text>
      <rect x="560" y="0" width="138" height="40" rx="20" fill="#0f172a" stroke="#334155"/>
      <text x="584" y="26" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="700">Terminal 8</text>
    </g>

    <g transform="translate(42 246)">
      <rect x="0" y="0" width="690" height="186" rx="24" fill="#0b1220" stroke="#1e293b"/>
      <rect x="24" y="24" width="132" height="82" rx="16" fill="#172033"/>
      <path d="M43 80 L71 50 L94 72 L113 54 L139 82" fill="none" stroke="#22d3ee" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="184" y="52" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="22" fill="#f8fafc" font-weight="800">Find the exact moment</text>
      <text x="184" y="86" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="17" fill="#94a3b8">App metadata, OCR text, URL, clipboard, and time live together.</text>
      <text x="184" y="122" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#67e8f9" font-weight="700">Safari · API docs · 14:32</text>
      <rect x="24" y="134" width="642" height="10" rx="5" fill="#1e293b"/>
      <rect x="72" y="134" width="72" height="10" rx="5" fill="#22d3ee"/>
      <rect x="210" y="134" width="46" height="10" rx="5" fill="#f59e0b"/>
      <rect x="402" y="134" width="126" height="10" rx="5" fill="#22d3ee"/>
      <circle cx="430" cy="139" r="18" fill="#f8fafc" stroke="#22d3ee" stroke-width="5"/>
    </g>

    <g transform="translate(780 84)">
      <rect x="0" y="0" width="374" height="348" rx="26" fill="#0b1220" stroke="#1e293b"/>
      <text x="28" y="44" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="21" fill="#f8fafc" font-weight="800">App markers</text>
      <text x="28" y="78" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#94a3b8">See where each app appears in the day.</text>

      <g transform="translate(28 120)">
        <rect x="0" y="0" width="318" height="54" rx="16" fill="#101827" stroke="#1f2937"/>
        <circle cx="28" cy="27" r="11" fill="#22d3ee"/>
        <text x="52" y="32" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="700">Safari research block</text>
        <rect x="242" y="18" width="50" height="18" rx="9" fill="#164e63"/>
      </g>
      <g transform="translate(28 190)">
        <rect x="0" y="0" width="318" height="54" rx="16" fill="#101827" stroke="#1f2937"/>
        <circle cx="28" cy="27" r="11" fill="#f59e0b"/>
        <text x="52" y="32" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="700">Cursor debug block</text>
        <rect x="226" y="18" width="66" height="18" rx="9" fill="#78350f"/>
      </g>
      <g transform="translate(28 260)">
        <rect x="0" y="0" width="318" height="54" rx="16" fill="#101827" stroke="#1f2937"/>
        <circle cx="28" cy="27" r="11" fill="#22c55e"/>
        <text x="52" y="32" font-family="Inter, SF Pro Display, Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="700">Terminal release check</text>
        <rect x="238" y="18" width="54" height="18" rx="9" fill="#14532d"/>
      </g>
    </g>
