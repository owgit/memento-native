name: Feature request
description: Propose a scoped improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How will we know this is done?
